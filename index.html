<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Bible Reading</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1a17;
      --text: #e8e0d0;
      --muted: #7a7060;
      --accent: #d4b96a;
      --rule: #2e2b25;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 0 32px;
      max-width: 500px;
      width: 100%;
      animation: fadeIn 1s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 32px auto;
      width: 60px;
    }

    .day-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .date-display {
      font-size: 40px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .reading-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .verse {
      font-size: 64px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .verse.special {
      font-size: 40px;
      font-style: italic;
      font-weight: 300;
      color: var(--text);
    }

    .sub-note {
      font-size: 17px;
      font-style: italic;
      color: var(--muted);
      margin-top: 16px;
      line-height: 1.6;
    }

    .plan-note {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--rule);
      text-transform: uppercase;
      margin-top: 40px;
    }
  </style>
</head>

      document.getElementById('dayName').textContent    = days[now.getDay()];
      document.getElementById('dateDisplay').textContent = `${dd}${months[now.getMonth()]}${now.getFullYear()}`;

      const verseEl = document.getElementById('verse');
      const noteEl  = document.getElementById('subNote');

      if (reading === "Holy Saturday") {
        verseEl.textContent = "Holy Saturday";
        verseEl.classList.add('special');
        noteEl.textContent  = "A day of waiting and reflection";
      } else if (reading) {
        verseEl.textContent = reading;
        verseEl.classList.remove('special');
        noteEl.textContent  = notes[key] || "Read through the chapter listed above to stay on track.";
      } else {
        verseEl.textContent = "No reading assigned";
        verseEl.classList.add('special');
        noteEl.textContent  = "";
      }
    }
